services:
  # Backend API
  - type: web
    name: blog-agent-api
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: PORT
        value: 10000
      - key: LOCAL_DRAFTS_DIR
        value: /data/drafts
      - key: MEMORY_INDEX_PATH
        value: /data/memory/vectors.index
      - key: MEMORY_METADATA_PATH
        value: /data/memory/metadata.json
    disk:
      name: blog-data
      mountPath: /data
      sizeGB: 1

  # Frontend Dashboard
  - type: web
    name: blog-agent-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false # Set this to your blog-agent-api URL in Render dashboard
